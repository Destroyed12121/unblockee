<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unblockee</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: black;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at center, #000000, #0a0a0a, #111111, #1a1a1a, #222222);
        }

        .dot {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            animation: moveDot 5s linear infinite;
        }

        @keyframes moveDot {
            0% { transform: translate(50vw, 50vh) scale(1); }
            100% { transform: translate(-50vw, -50vh) scale(0); }
        }

        .grey-button {
            width: 600px;
            height: 225px;
            background-color: #333;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            border-radius: 8px;
            border: none;
            font-size: 24px;
        }

    .grey-button:hover {
    background-color: rgba(51, 51, 51, 0.65); /* Same grey with slight transparency */
    transform: scale(1.05);
}

    </style>
</head>
<body>
    <div class="background"></div>
    
    <script>
        // Add 200 animated dots to the background
        for (let i = 0; i < 200; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.style.left = Math.random() * 100 + 'vw';
            dot.style.top = Math.random() * 100 + 'vh';
            dot.style.animationDuration = 1.8 + Math.random() * 5 + 's';
            document.querySelector('.background').appendChild(dot);
        }
    </script>

    <button class="grey-button">Play</button>

    <script>
        const url = "https://unblockee2.neocities.org/realindex";
        let gameWindow;

        document.querySelector('.grey-button').addEventListener('click', () => {
            if (!gameWindow || gameWindow.closed) {
                // Open about:blank window
                gameWindow = window.open('about:blank', '_blank');
                
                // Build the content
                const doc = gameWindow.document;
                doc.write(`
                    <!DOCTYPE html>
                    <html>
                    <head>
                        <style>
                            body { margin: 0; overflow: hidden; }
                            object { width: 100vw; height: 100vh; border: none; }
                        </style>
                    </head>
                    <body>
                        <object data="${url}"></object>
                    </body>
                    </html>
                `);
                doc.close();
                
                // Update button
                document.querySelector('.grey-button').style.background = '#555';
                document.querySelector('.grey-button').textContent = 'play';
            } else {
                gameWindow.focus();
            }
        });
    </script>
</body>
</html>
