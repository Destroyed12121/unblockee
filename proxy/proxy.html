    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROXY</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
        }
        button {
            width: 100%;
            height: 100%;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 24px;
        }
    </style>
</head>
<body>
    <button>Play</button>
    <script>
        const url = "https://proxyfrfr.surge.sh";
        let gameWindow;

        document.querySelector('button').addEventListener('click', () => {
            if (!gameWindow || gameWindow.closed) {
                // Open the URL directly in a new tab/window
                gameWindow = window.open(url, '_blank');
                
                // Update button
                document.querySelector('button').style.background = '#444';
                document.querySelector('button').textContent = 'Game Open';
            } else {
                gameWindow.focus();
            }
        });
    </script>
</body>
